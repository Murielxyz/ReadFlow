name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd ReadFlow && npm install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build APK
        run: |
          cd ReadFlow
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --output=app-release.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReadFlow-APK
          path: ReadFlow/app-release.apk
          retention-days: 30
